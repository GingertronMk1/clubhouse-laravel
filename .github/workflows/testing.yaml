name: Testing

on:
    pull_request:
        branches:
            - main
    push:
        branches:
            - main

jobs:
    testing:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v3
            - name: Cache Composer
              id: cache-composer
              uses: actions/cache@v3
              with:
                path: vendor
                key: ${{ hashFiles('composer.lock') }}
            - name: Cache NPM
              id: cache-npm
              uses: actions/cache@v3
              with:
                path: node_modules
                key: ${{ hashFiles('package-lock.json') }}
            - name: Install
              run: ./bin/util/install
            - name: PHP Style
              run: ./bin/app/composer check
              if: always()
            - name: Test, and fail on <85% code coverage
              run: ./bin/app/test
              if: always()
            - name: Prettier
              run: ./bin/node/npm run eslint
              if: always()
